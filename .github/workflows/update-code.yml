name: Update Play Code

on:
  schedule:
    - cron: "*/1 * * * *"  # every 1 minute (GitHub Actions minimum reliable interval)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Generate random play_code and send to API
        run: |
          CODE=$(python -c "import random, string; print(''.join(random.choices(string.ascii_letters + string.digits, k=10)))")

          echo "Generated play_code: $CODE"

          curl -X POST https://project-zn2an.vercel.app/update-code \
          -H "Content-Type: application/json" \
          -d "{\"play_code\": \"$CODE\"}"
